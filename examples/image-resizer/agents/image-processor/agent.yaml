id: image-processor
type: code
version: 0.1.0
purpose: "Resize image according to the strategy plan from strategy-agent"

code:
  entrypoint: ./index.ts
  timeout: 30000

deterministic:
  pre_checks:
    - condition: "cabinet-exists(path=strategy/plan)"
      action: halt
      message: "No strategy plan found — run strategy-agent first"
    - condition: "cabinet-exists(path=input/path)"
      action: halt
      message: "No input path found — run metadata-reader first"

learning:
  channels: []
