# Foreman Agent — pipeline orchestrator with approval loop
# Type: foreman
# Purpose: Run a pipeline of agents, check scores, revise, loop until approved.
# A Foreman IS an agent — replaces bespoke runner scripts.

id: foreman
type: foreman
version: 0.1.0
purpose: "Multi-cycle pipeline orchestration with approval gates"

foreman:
  pipeline: []
  critics: []
  revision: []
  approval: []
  maxCycles: 10
  plateauWindow: 3
  products: []
  scoreHistoryKey: foreman/scores

communication:
  consumes:
    - "foreman/config"
  produces:
    - "foreman/scores"
    - "foreman/status"
    - "foreman/plateau"

learning:
  channels: []
